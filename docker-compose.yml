version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: gisnas_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: gisnas_backend
    ports:
      - "8081:8080"
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gisnas_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

# Data backup otomatis tersimpan di ./data/postgres/
